name: Build and deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: yayindizinacr438761
  IMAGE_NAME: yayindizin
  RESOURCE_GROUP: yayindizin-prod-rg
  CONTAINER_APP: yayindizin
  ENVIRONMENT: yayindizin-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create or update Container App
        run: |
          if az containerapp show --name "$CONTAINER_APP" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            echo "Container App mevcut — güncelleniyor..."
            az containerapp update \
              --name "$CONTAINER_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --image "${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${{ github.sha }}"
          else
            echo "Container App yok — oluşturuluyor..."
            az containerapp create \
              --name "$CONTAINER_APP" \
              --resource-group "$RESOURCE_GROUP" \
              --environment "$ENVIRONMENT" \
              --image "${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${{ github.sha }}" \
              --target-port 8080 \
              --ingress external \
              --env-vars NODE_ENV=production \
              --registry-server "${ACR_NAME}.azurecr.io" \
              --registry-username "${{ secrets.ACR_USERNAME }}" \
              --registry-password "${{ secrets.ACR_PASSWORD }}" \
              --min-replicas 0 \
              --max-replicas 1 \
              --cpu 1.0 \
              --memory 2.0Gi
          fi

      - name: Get app URL
        run: |
          URL=$(az containerapp show \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "🚀 Uygulama URL: https://$URL"
          echo "APP_URL=https://$URL" >> $GITHUB_ENV
